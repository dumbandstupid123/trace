services:
  - type: web
    name: trace
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --timeout 120 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: TRACE_HOSTED
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
